################################################################################
# WORKFLOW: Docker Image Build & Push
# Runs on main/master push or manual trigger
# Builds Docker image and pushes to Docker Hub & GitHub Container Registry
################################################################################

name: 🐳 Docker Build & Push

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app.js'
      - 'Dockerfile'
      - 'package.json'
      - 'docker-compose.yml'
      - '.github/workflows/docker-push.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push image to registry?'
        required: true
        default: 'true'

env:
  REGISTRY_DOCKER_HUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: stellarmind

jobs:
  build-and-push:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔑 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # ========================================================================
      # Docker Hub
      # ========================================================================
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
        if: secrets.DOCKER_HUB_USERNAME != ''
        continue-on-error: true
      
      - name: 📊 Generate Docker metadata (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_DOCKER_HUB }}/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: 🏗️ Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && secrets.DOCKER_HUB_USERNAME != '' }}
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        continue-on-error: true
      
      # ========================================================================
      # GitHub Container Registry (GHCR)
      # ========================================================================
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📊 Generate Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: 🏗️ Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ github.repository }}:buildcache,mode=max
      
      # ========================================================================
      # Generate SBOM (Software Bill of Materials)
      # ========================================================================
      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-${{ github.sha }}.spdx.json
      
      - name: 📤 Upload SBOM artifact
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom-${{ github.sha }}.spdx.json

  notify:
    name: 📢 Notify Build Status
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    
    steps:
      - name: ✅ Success notification
        if: needs.build-and-push.result == 'success'
        run: echo "🎉 Docker image successfully built and pushed!"
      
      - name: ❌ Failure notification
        if: needs.build-and-push.result == 'failure'
        run: echo "⚠️ Docker build failed. Check logs for details."
